<div class="page-header">
  <div class="container"><h1>Gallery</h1></div>
</div>
<div class="container pb-4">
  <div id="fb-root"></div>
  <div class="alert alert-info mb-4">
    📺 Below are event videos and posts from our Facebook page. Please ensure you are connected to the internet to view them.
  </div>
  <div class="row g-4">
    <div class="col-md-6" *ngFor="let v of fbVideos">
      <div class="card h-100">
        <div class="card-header card-header-custom small">{{ v.title }}</div>
        <div class="card-body d-flex align-items-center justify-content-center p-2" style="background:#f0f2f5;">
          <div class="fb-video"
            [attr.data-href]="v.href"
            data-width="500"
            data-show-text="true">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
