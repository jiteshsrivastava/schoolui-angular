<div class="page-header">
  <div class="container"><h1>Facilities</h1></div>
</div>
<div class="container pb-4">
  <div class="row g-4">
    <div class="col-md-4" *ngFor="let fac of facilities">
      <div class="card h-100">
        <div class="card-header card-header-custom">{{ fac.title }}</div>
        <div class="card-body p-0">
          <div class="carousel slide">
            <div class="carousel-inner">
              <div *ngFor="let img of fac.images; let i = index"
                class="carousel-item"
                [class.active]="i === fac.currentIndex">
                <img [src]="img" [alt]="fac.title" class="d-block w-100" style="object-fit:cover;height:200px;" />
              </div>
            </div>
            <button class="carousel-control-prev" type="button" (click)="prevSlide(fac)">
              <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" (click)="nextSlide(fac)">
              <span class="carousel-control-next-icon"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
