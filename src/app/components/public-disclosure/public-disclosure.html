<div class="page-header">
  <div class="container"><h1>Public Disclosures</h1></div>
</div>
<div class="container pb-4">
  <div class="row g-3">
    <div class="col-md-4" *ngFor="let doc of documents">
      <div class="card h-100">
        <div class="card-body d-flex align-items-center">
          <a [href]="doc.file" class="btn btn-outline-primary w-100 text-start" style="white-space:normal;">
            📄 {{ doc.label }}
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
